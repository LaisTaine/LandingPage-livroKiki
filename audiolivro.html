<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiolivro — Kiki, a Fadinha</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #3a8c4e;
    --verde-claro: #5cb96a;
    --verde-menta: #a8e6b0;
    --rosa: #f06292;
    --amarelo: #ffe066;
    --creme: #fffde7;
    --texto: #2d2d2d;
    --branco: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Nunito', sans-serif;
    color: var(--texto);
    background: linear-gradient(160deg, #1a6b32 0%, #2e8b4a 40%, #4caf50 70%, #a5d6a7 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 60px;
    overflow-x: hidden;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    color: var(--amarelo);
    opacity: 0.6;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    font-size: var(--sz, 18px);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(0.8) rotate(0deg); }
    50% { opacity: 0.8; transform: scale(1.2) rotate(20deg); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%,100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
  }

  /* Card principal */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 28px;
    padding: 48px 40px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    animation: fadeUp 0.8s ease both;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }

  .book-cover {
    animation: float 4s ease-in-out infinite;
    margin-bottom: 28px;
  }
  .book-cover img {
    width: min(180px, 60vw);
    filter: drop-shadow(0 16px 32px rgba(0,0,0,0.4));
    border-radius: 6px;
  }

  .access-badge {
    display: inline-block;
    background: var(--amarelo);
    color: #2d2d2d;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    color: var(--branco);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  h1 span { color: var(--amarelo); }

  .subtitle {
    color: var(--verde-menta);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  /* Player */
  .player-wrap {
    background: rgba(0,0,0,0.25);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 28px;
  }
  .player-label {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  audio {
    width: 100%;
    border-radius: 8px;
    accent-color: var(--amarelo);
  }
  audio::-webkit-media-controls-panel {
    background: transparent;
  }

  .duration-note {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-top: 10px;
  }

  /* Rodapé */
  .footer-note {
    margin-top: 32px;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    line-height: 1.6;
  }
  .footer-note a {
    color: var(--verde-menta);
    text-decoration: none;
  }
  .footer-note a:hover { text-decoration: underline; }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.12);
    margin: 24px 0;
  }

  .stars-deco {
    color: var(--amarelo);
    font-size: 18px;
    letter-spacing: 6px;
    opacity: 0.7;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<!-- Estrelinhas de fundo -->
<div class="stars" aria-hidden="true">
  <span class="star" style="--sz:18px;--d:2.5s;--delay:0s;top:8%;left:6%">✦</span>
  <span class="star" style="--sz:12px;--d:3.5s;--delay:0.4s;top:18%;left:22%">★</span>
  <span class="star" style="--sz:22px;--d:2s;--delay:0.9s;top:12%;right:14%">✦</span>
  <span class="star" style="--sz:14px;--d:4s;--delay:0.2s;top:42%;right:6%">✨</span>
  <span class="star" style="--sz:10px;--d:2.8s;--delay:1.4s;top:72%;left:4%">★</span>
  <span class="star" style="--sz:16px;--d:3.2s;--delay:0.7s;top:82%;right:10%">✦</span>
  <span class="star" style="--sz:20px;--d:2.2s;--delay:0.1s;top:58%;left:12%">✦</span>
  <span class="star" style="--sz:11px;--d:3.8s;--delay:1.1s;top:28%;right:28%">★</span>
</div>

<div class="card">

  <div class="book-cover">
    <img src="capa-kiki5.png" alt="Capa do livro Kiki, a Fadinha">
  </div>

  <div class="stars-deco">✦ ✦ ✦</div>

  <span class="access-badge">🎧 Acesso exclusivo</span>

  <h1>Kiki,<br><span>a fadinha</span></h1>
  <p class="subtitle">Audiolivro completo — ouça quando e onde quiser.</p>

  <div class="player-wrap">
    <div class="player-label">🎵 Audiolivro completo</div>
    <audio controls preload="metadata">
      <source src="kiki_audio_final.mp3" type="audio/mpeg">
      Seu navegador não suporta áudio HTML5.
    </audio>
    <p class="duration-note">Use os fones para uma experiência mais imersiva ✨</p>
  </div>

  <hr class="divider">

  <p class="footer-note">
    Este link é pessoal e intransferível.<br>
    Adquira o livro impresso em
    <a href="https://publicadeira.lojavirtualnuvem.com.br/produtos/kiki-a-fadinha/" target="_blank">nossa loja</a>.
  </p>

</div>

</body>
</html>
